version: "3.9"
services:
  db:
    image: postgres:16-alpine
    container_name: inventario_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: inventario_db
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d inventario_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: .
    container_name: inventario_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: admin
      DB_PASSWORD: admin123
      DB_NAME: inventario_db
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
volumes:
  pg_data:
